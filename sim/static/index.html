<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PocketPD Simulator</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
            background: #1a1a2e;
            color: #e0e0e0;
            padding: 20px;
        }
        h1 { color: #00d4ff; margin-bottom: 16px; font-size: 1.4em; }
        h2 { color: #888; font-size: 0.9em; text-transform: uppercase; margin-bottom: 8px; }

        .container { display: flex; gap: 24px; flex-wrap: wrap; }

        /* OLED Display Panel */
        .display-panel {
            background: #0a0a1a;
            border: 2px solid #333;
            border-radius: 8px;
            padding: 16px;
        }
        #oled-canvas {
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            border: 1px solid #444;
            background: #000;
        }

        /* Status Panel */
        .status-panel {
            background: #16213e;
            border-radius: 8px;
            padding: 16px;
            min-width: 280px;
        }
        .reading { margin-bottom: 12px; }
        .reading-label { font-size: 0.75em; color: #888; }
        .reading-value { font-size: 1.8em; font-weight: bold; color: #00ff88; font-family: monospace; }
        .reading-value.off { color: #666; }
        .reading-unit { font-size: 0.8em; color: #888; }
        .status-row { display: flex; gap: 16px; margin-bottom: 8px; }
        .badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8em;
            font-weight: bold;
        }
        .badge-on { background: #00ff88; color: #000; }
        .badge-off { background: #333; color: #888; }
        .badge-cv { background: #00d4ff; color: #000; }
        .badge-cc { background: #ff6b35; color: #fff; }
        .badge-pps { background: #b388ff; color: #000; }

        /* Control Panel */
        .control-panel {
            background: #16213e;
            border-radius: 8px;
            padding: 16px;
            min-width: 260px;
        }
        .btn-group { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
        .btn {
            padding: 8px 16px;
            border: 1px solid #444;
            border-radius: 4px;
            background: #1a1a2e;
            color: #e0e0e0;
            cursor: pointer;
            font-size: 0.85em;
        }
        .btn:hover { background: #2a2a4e; border-color: #00d4ff; }
        .btn:active { background: #00d4ff; color: #000; }
        .btn-danger { border-color: #ff6b35; }
        .btn-danger:hover { border-color: #ff6b35; background: #3a1a1a; }
        .btn-primary { border-color: #00d4ff; }

        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; font-size: 0.75em; color: #888; margin-bottom: 4px; }
        .input-row { display: flex; gap: 4px; align-items: center; }
        .input-row input {
            width: 100px;
            padding: 6px 8px;
            background: #0a0a1a;
            border: 1px solid #444;
            border-radius: 4px;
            color: #e0e0e0;
            font-family: monospace;
            font-size: 1em;
        }

        /* PDO list */
        .pdo-list { font-size: 0.8em; color: #aaa; margin-top: 8px; }
        .pdo-item { padding: 2px 0; }
        .pdo-item.pps { color: #b388ff; }

        /* Connection status */
        .status-indicator {
            display: inline-block;
            width: 8px; height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }
        .connected { background: #00ff88; }
        .disconnected { background: #ff4444; }

        /* Energy section */
        .energy-section { margin-top: 12px; padding-top: 12px; border-top: 1px solid #333; }
        .energy-row { display: flex; justify-content: space-between; font-size: 0.85em; margin-bottom: 4px; }

        /* State Machine Diagram */
        .state-panel {
            background: #16213e;
            border-radius: 8px;
            padding: 16px;
            min-width: 220px;
        }
        .state-panel svg { display: block; margin: 0 auto; }
        .sm-node rect {
            fill: #0a0a1a;
            stroke: #444;
            stroke-width: 1.5;
            rx: 6;
            transition: fill 0.3s, stroke 0.3s, filter 0.3s;
        }
        .sm-node text {
            fill: #888;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace;
            font-size: 11px;
            text-anchor: middle;
            transition: fill 0.3s;
        }
        .sm-node text.sm-label {
            font-size: 9px;
            fill: #555;
        }
        .sm-node.active rect {
            fill: #0d2847;
            stroke: #00d4ff;
            stroke-width: 2;
            filter: drop-shadow(0 0 6px rgba(0, 212, 255, 0.5));
        }
        .sm-node.active text { fill: #00d4ff; }
        .sm-node.active text.sm-label { fill: #00a0cc; }
        .sm-arrow { stroke: #444; stroke-width: 1.2; fill: none; marker-end: url(#sm-arrowhead); }
        .sm-arrow.active { stroke: #00d4ff; filter: drop-shadow(0 0 3px rgba(0, 212, 255, 0.4)); }
        .sm-diamond { fill: #0a0a1a; stroke: #444; stroke-width: 1.5; }
        .sm-choice-label { fill: #555; font-family: monospace; font-size: 8px; }
    </style>
</head>
<body>
    <h1>PocketPD Simulator</h1>
    <p style="margin-bottom: 16px; font-size: 0.8em; color: #666;">
        <span id="conn-indicator" class="status-indicator disconnected"></span>
        <span id="conn-text">Connecting...</span>
    </p>

    <div class="container">
        <!-- OLED Display -->
        <div class="display-panel">
            <h2>OLED Display (128x64)</h2>
            <canvas id="oled-canvas" width="384" height="192"></canvas>
        </div>

        <!-- Status -->
        <div class="status-panel">
            <h2>Measurements</h2>
            <div class="status-row">
                <span id="badge-output" class="badge badge-off">OFF</span>
                <span id="badge-mode" class="badge badge-cv">CV</span>
                <span id="badge-pps" class="badge badge-pps" style="display:none">PPS</span>
            </div>
            <div class="reading">
                <div class="reading-label">Voltage</div>
                <div><span id="val-voltage" class="reading-value">0.00</span><span class="reading-unit"> V</span></div>
            </div>
            <div class="reading">
                <div class="reading-label">Current</div>
                <div><span id="val-current" class="reading-value">0.000</span><span class="reading-unit"> A</span></div>
            </div>
            <div class="reading">
                <div class="reading-label">Power</div>
                <div><span id="val-power" class="reading-value">0.00</span><span class="reading-unit"> W</span></div>
            </div>

            <div class="energy-section">
                <h2>Energy</h2>
                <div class="energy-row"><span>Time</span><span id="val-time">0:00:00</span></div>
                <div class="energy-row"><span>Energy</span><span id="val-wh">0.000 Wh</span></div>
                <div class="energy-row"><span>Charge</span><span id="val-ah">0.0000 Ah</span></div>
            </div>

            <div class="pdo-list" id="pdo-list"></div>
        </div>

        <!-- Controls -->
        <div class="control-panel">
            <h2>Output</h2>
            <div class="btn-group">
                <button class="btn btn-primary" onclick="apiPost('/api/output', {on: true})">ON</button>
                <button class="btn btn-danger" onclick="apiPost('/api/output', {on: false})">OFF</button>
            </div>

            <h2>Target Voltage</h2>
            <div class="input-group">
                <div class="input-row">
                    <button class="btn" onclick="adjustVoltage(-1000)">-1V</button>
                    <button class="btn" onclick="adjustVoltage(-100)">-.1</button>
                    <input type="number" id="input-voltage" value="5000" step="20">
                    <button class="btn" onclick="adjustVoltage(100)">+.1</button>
                    <button class="btn" onclick="adjustVoltage(1000)">+1V</button>
                </div>
                <button class="btn btn-primary" onclick="setVoltage()" style="margin-top: 4px;">Set</button>
            </div>

            <h2>Target Current</h2>
            <div class="input-group">
                <div class="input-row">
                    <button class="btn" onclick="adjustCurrent(-500)">-.5A</button>
                    <button class="btn" onclick="adjustCurrent(-50)">-.05</button>
                    <input type="number" id="input-current" value="3000" step="50">
                    <button class="btn" onclick="adjustCurrent(500)">+.5A</button>
                    <button class="btn" onclick="adjustCurrent(50)">+.05</button>
                </div>
                <button class="btn btn-primary" onclick="setCurrent()" style="margin-top: 4px;">Set</button>
            </div>

            <h2>Encoder</h2>
            <div class="btn-group">
                <button class="btn" onclick="apiPost('/api/encoder', {delta: -1})">&#x21BA; CCW</button>
                <button class="btn" onclick="apiPost('/api/encoder', {delta: 1})">CW &#x21BB;</button>
            </div>

            <h2>Buttons</h2>
            <div class="btn-group">
                <button class="btn" onclick="apiPost('/api/button/output', {event: 'short'})" title="Toggle output on/off">Out: Toggle</button>
                <button class="btn" onclick="apiPost('/api/button/output', {event: 'long'})" title="Switch between normal and energy display">Out: Energy</button>
            </div>
            <div class="btn-group">
                <button class="btn" onclick="apiPost('/api/button/select', {event: 'short'})" title="Switch between voltage and current adjustment">Sel: V/I</button>
                <button class="btn" onclick="apiPost('/api/button/select', {event: 'long'})" title="Confirm menu selection">Sel: Confirm</button>
            </div>
            <div class="btn-group">
                <button class="btn" onclick="apiPost('/api/button/encoder', {event: 'short'})" title="Cycle step size (20/100/1000)">Enc: Scale</button>
                <button class="btn" onclick="apiPost('/api/button/encoder', {event: 'long'})" title="Enter/exit profile menu">Enc: Menu</button>
            </div>
        </div>

        <!-- State Machine Diagram -->
        <div class="state-panel">
            <h2>State Machine</h2>
            <svg id="sm-diagram" width="220" height="420" viewBox="0 0 220 420">
                <defs>
                    <marker id="sm-arrowhead" markerWidth="8" markerHeight="6"
                            refX="8" refY="3" orient="auto">
                        <polygon points="0 0, 8 3, 0 6" fill="#444"/>
                    </marker>
                    <marker id="sm-arrowhead-active" markerWidth="8" markerHeight="6"
                            refX="8" refY="3" orient="auto">
                        <polygon points="0 0, 8 3, 0 6" fill="#00d4ff"/>
                    </marker>
                </defs>

                <!-- BOOT -->
                <g id="sm-state-0" class="sm-node">
                    <rect x="60" y="10" width="100" height="40"/>
                    <text x="110" y="27">BOOT</text>
                    <text x="110" y="41" class="sm-label">splash 500ms</text>
                </g>
                <line id="sm-arrow-0-1" class="sm-arrow" x1="110" y1="50" x2="110" y2="70"/>

                <!-- OBTAIN -->
                <g id="sm-state-1" class="sm-node">
                    <rect x="60" y="70" width="100" height="40"/>
                    <text x="110" y="87">OBTAIN</text>
                    <text x="110" y="101" class="sm-label">read PDOs</text>
                </g>
                <line id="sm-arrow-1-2" class="sm-arrow" x1="110" y1="110" x2="110" y2="130"/>

                <!-- CAPDISPLAY -->
                <g id="sm-state-2" class="sm-node">
                    <rect x="50" y="130" width="120" height="40"/>
                    <text x="110" y="147">CAPDISPLAY</text>
                    <text x="110" y="161" class="sm-label">show profiles 3s</text>
                </g>
                <line id="sm-arrow-2-c" class="sm-arrow" x1="110" y1="170" x2="110" y2="195"/>

                <!-- Choice diamond -->
                <polygon class="sm-diamond" points="110,195 125,210 110,225 95,210"/>

                <!-- Choice to NORMAL_PPS -->
                <line id="sm-arrow-c-3" class="sm-arrow" x1="95" y1="210" x2="55" y2="250"/>
                <text class="sm-choice-label" x="46" y="228">PPS</text>

                <!-- Choice to NORMAL_PDO -->
                <line id="sm-arrow-c-4" class="sm-arrow" x1="125" y1="210" x2="165" y2="250"/>
                <text class="sm-choice-label" x="155" y="228">fixed</text>

                <!-- NORMAL_PPS -->
                <g id="sm-state-3" class="sm-node">
                    <rect x="5" y="250" width="100" height="40"/>
                    <text x="55" y="267">NORMAL_PPS</text>
                    <text x="55" y="281" class="sm-label">fine V/I ctrl</text>
                </g>

                <!-- NORMAL_PDO -->
                <g id="sm-state-4" class="sm-node">
                    <rect x="115" y="250" width="100" height="40"/>
                    <text x="165" y="267">NORMAL_PDO</text>
                    <text x="165" y="281" class="sm-label">fixed profiles</text>
                </g>

                <!-- NORMAL_PPS to MENU -->
                <line id="sm-arrow-3-5" class="sm-arrow" x1="55" y1="290" x2="85" y2="340"/>
                <!-- NORMAL_PDO to MENU -->
                <line id="sm-arrow-4-5" class="sm-arrow" x1="165" y1="290" x2="135" y2="340"/>
                <text class="sm-choice-label" x="28" y="320">enc long</text>
                <text class="sm-choice-label" x="150" y="320">enc long</text>

                <!-- MENU -->
                <g id="sm-state-5" class="sm-node">
                    <rect x="60" y="340" width="100" height="40"/>
                    <text x="110" y="357">MENU</text>
                    <text x="110" y="371" class="sm-label">select profile</text>
                </g>

                <!-- MENU back to choice (curved path up the side) -->
                <path id="sm-arrow-5-c" class="sm-arrow" d="M 60,360 L 15,360 L 15,210 L 95,210" fill="none"/>
                <text class="sm-choice-label" x="3" y="288">sel long</text>
            </svg>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
